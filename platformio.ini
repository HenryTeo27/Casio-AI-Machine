[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 16MB
board_build.partitions = huge_app.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=1

lib_deps =
  olikraus/U8g2@^2.35.19
  bblanchon/ArduinoJson@^7.0.4